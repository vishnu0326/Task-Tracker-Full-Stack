version: "3.8"

services:

  backend:
    build: ./backend
    container_name: task_backend
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    container_name: task_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: task_redis
    ports:
      - "6379:6379"

volumes:
  mongo_data: